services:
  # ── Backend (FastAPI) ──────────────────────────────────────────
  - type: web
    name: competitive-intel-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # fill in on Render dashboard
      - key: SERPER_API_KEY
        sync: false
      - key: MODEL_NAME
        value: groq/llama-3.3-70b-versatile
      - key: MAX_TOKENS
        value: "600"
      - key: MAX_SOURCES
        value: "3"
      - key: MAX_STEPS
        value: "6"
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1              # persists the SQLite DB across redeploys

  # ── Frontend (Next.js) ────────────────────────────────────────
  - type: web
    name: competitive-intel-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: competitive-intel-backend
          type: web
          property: host
          format: https://{host}
      - key: NODE_VERSION
        value: "18"
